name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Setup golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Check formatting
        run: make tofu-fmt-check

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Lint
        run: make lint
