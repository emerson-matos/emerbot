name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Enable Cache
        uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Check formatting
        run: nix develop --command sh -c "make tofu-fmt-check"

      - name: Build
        run: nix develop --command sh -c "make build"

      - name: Test
        run: nix develop --command sh -c "make test"

      - name: Lint
        run: nix develop --command sh -c "make lint"
