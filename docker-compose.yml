name: emerbot

# ---------------------------------------------------------------------------
# Shared env fragments
# ---------------------------------------------------------------------------
x-aws-local: &aws-local
  AWS_ACCESS_KEY_ID: local
  AWS_SECRET_ACCESS_KEY: local
  AWS_REGION: us-east-1

x-dynamo-env: &dynamo-env
  DYNAMODB_ENDPOINT: http://dynamodb-local:8000
  FINANCIAL_ENTRIES_TABLE: emerbot-local-financial-entries

services:
  # ---------------------------------------------------------------------------
  # DynamoDB Local
  # ---------------------------------------------------------------------------
  dynamodb-local:
    image: docker.io/amazon/dynamodb-local:latest
    container_name: emerbot-dynamodb
    restart: unless-stopped
    command: -jar DynamoDBLocal.jar -sharedDb -dbPath /data
    ports:
      - "8000:8000"
    volumes:
      - dynamodb-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8000"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # DynamoDB table bootstrap (runs once, exits 0)
  # ---------------------------------------------------------------------------
  dynamodb-init:
    image: docker.io/amazon/aws-cli:latest
    container_name: emerbot-dynamodb-init
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      <<: *aws-local
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
    volumes:
      - ./docker/dynamodb-init/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]

  # ---------------------------------------------------------------------------
  # DynamoDB Admin UI  →  http://localhost:8001
  # ---------------------------------------------------------------------------
  dynamodb-admin:
    image: docker.io/aaronshaf/dynamodb-admin:latest
    container_name: emerbot-dynamodb-admin
    restart: unless-stopped
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    ports:
      - "8001:8001"

  # ---------------------------------------------------------------------------
  # Cognito Local  →  http://localhost:9229
  # ---------------------------------------------------------------------------
  cognito-local:
    image: docker.io/jagregory/cognito-local:latest
    container_name: emerbot-cognito-local
    restart: unless-stopped
    ports:
      - "9229:9229"
    volumes:
      # cognito-local writes back into .cognito/ at startup (confirmed
      # empirically: it fails with EROFS if config.json is mounted read-only)
      # — so config.json is copied into the named volume by the entrypoint
      # below rather than bind-mounted directly, which would otherwise let
      # the container dirty the tracked file on every start (also confirmed
      # empirically: it gets reformatted/rewritten in place).
      - ./docker/cognito-local/config.json:/config-src/config.json:ro
      - cognito-data:/app/.cognito
    entrypoint: ["/bin/sh", "-c"]
    command:
      - cp /config-src/config.json /app/.cognito/config.json && exec node /app/start.js

  # ---------------------------------------------------------------------------
  # Cognito Local bootstrap (runs once, exits 0): creates the local user pool,
  # app client, and demo user, then writes their (dynamically generated) IDs
  # to a shared volume for dashboard-api/web to pick up — see
  # docker/cognito-init/init.sh for why this can't just be static env vars.
  # ---------------------------------------------------------------------------
  cognito-init:
    image: docker.io/amazon/aws-cli:latest
    container_name: emerbot-cognito-init
    depends_on:
      - cognito-local
    environment:
      <<: *aws-local
      COGNITO_ENDPOINT: http://cognito-local:9229
      USER_DEMO_PASSWORD: ${USER_DEMO_PASSWORD:-fake123}
    volumes:
      - ./docker/cognito-init/init.sh:/init.sh:ro
      - cognito-runtime:/shared
    entrypoint: ["/bin/sh", "/init.sh"]

  # ---------------------------------------------------------------------------
  # Webhook service  →  http://localhost:8080
  # ---------------------------------------------------------------------------
  webhook:
    build:
      context: .
      dockerfile: apps/webhook/Dockerfile.local
    container_name: emerbot-webhook
    restart: unless-stopped
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
    environment:
      <<: [*aws-local, *dynamo-env]
      WEBHOOK_ADDR: :8080
      WEBHOOK_SECRET: local-secret
      WEBHOOK_VERIFY_TOKEN: local-secret
      DASHBOARD_URL: http://localhost:5173
      CONVERSATIONS_TABLE: emerbot-local-conversations
      REPLY_URL: http://wa-simulator:9000/reply
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Dashboard API  →  http://localhost:8081
  # ---------------------------------------------------------------------------
  dashboard-api:
    build:
      context: .
      dockerfile: apps/dashboard-api/Dockerfile.local
    container_name: emerbot-dashboard-api
    restart: unless-stopped
    depends_on:
      dynamodb-init:
        condition: service_completed_successfully
      cognito-init:
        condition: service_completed_successfully
    environment:
      <<: [*aws-local, *dynamo-env]
      API_ADDR: :8081
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - ./docker/dashboard-api/entrypoint.sh:/entrypoint.sh:ro
      - cognito-runtime:/shared:ro
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # WhatsApp Simulator  →  http://localhost:9000
  # ---------------------------------------------------------------------------
  wa-simulator:
    build:
      context: ./docker/wa-simulator
    container_name: emerbot-wa-simulator
    restart: unless-stopped
    depends_on:
      webhook:
        condition: service_healthy
    environment:
      WEBHOOK_URL: http://webhook:8080/webhook
      WEBHOOK_SECRET: local-secret
    ports:
      - "9000:9000"

  # ---------------------------------------------------------------------------
  # Frontend (Vite dev server)  →  http://localhost:5173
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: emerbot-web
    restart: unless-stopped
    depends_on:
      dashboard-api:
        condition: service_healthy
      cognito-init:
        condition: service_completed_successfully
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - ./docker/web/entrypoint.sh:/entrypoint.sh:ro
      - cognito-runtime:/shared:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      VITE_API_URL: http://localhost:8081
      VITE_COGNITO_ENDPOINT: http://localhost:9229
    ports:
      - "5173:5173"

volumes:
  dynamodb-data:
  cognito-data:
  cognito-runtime:
